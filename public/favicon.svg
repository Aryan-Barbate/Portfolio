<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    rect.bg { fill: #f4f0e8; }
    rect.border { stroke: #0a0a0a; }
    text.logo { fill: #0a0a0a; }
    @media (prefers-color-scheme: dark) {
      rect.bg { fill: #0d0c0a; }
      rect.border { stroke: #f4f0e8; }
      text.logo { fill: #f4f0e8; }
    }
  </style>
  <rect class="bg" width="32" height="32" />
  <rect class="border" x="2.5" y="2.5" width="27" height="27" stroke-width="3" />
  <text class="logo" x="16" y="21.5" text-anchor="middle" font-family="'Space Mono', monospace" font-size="13" font-weight="800" letter-spacing="-0.06em">AB</text>
</svg>
